apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragx-api
  labels:
    app: ragx
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ragx
      component: api
  template:
    metadata:
      labels:
        app: ragx
        component: api
    spec:
      containers:
        - name: ragx-api
          image: ragx:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ragx-config
            - secretRef:
                name: ragx-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: ragx-data-pvc
