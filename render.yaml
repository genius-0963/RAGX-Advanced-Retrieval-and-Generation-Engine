services:
  - type: web
    name: ragx-engine
    env: python
    buildCommand: "pip install --upgrade pip && pip install -e ."
    startCommand: "uvicorn ragx.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LLM_PROVIDER
        value: "gemini"
      - key: GOOGLE_API_KEY
        sync: false
